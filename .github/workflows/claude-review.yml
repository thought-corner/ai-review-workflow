name: Claude Review (reusable)

# 중앙 레포에 두는 재사용 워크플로우.
# 다른 레포가 `uses: thought-corner/ai-review-workflow/.github/workflows/claude-review.yml@v1` 로 호출한다.

on:
  workflow_call:
    inputs:
      model:
        description: "리뷰에 사용할 모델 (예: claude-opus-4-8, claude-sonnet-5)"
        type: string
        required: false
        default: "claude-opus-4-8"
      max_turns:
        description: "에이전트 최대 턴 수 (인라인 코멘트는 1건당 1턴을 쓰므로 넉넉히)"
        type: string
        required: false
        default: "40"
      prompt_file:
        description: "사용할 프롬프트 경로 (예: prompts/review.md, prompts/architecture.md, prompts/test-quality.md)"
        type: string
        required: false
        default: "prompts/review.md"
      scope:
        description: "리뷰 범위 힌트 (아키텍처 리뷰에서 도메인/모듈로 범위를 좁힐 때 사용. 코멘트 원문 그대로 넘겨도 됨)"
        type: string
        required: false
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "MAX 구독으로 발급한 OAuth 토큰 (claude setup-token)"
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    # 같은 PR에 대한 리뷰 실행을 동시에 1개로 제한 — 새 실행이 시작되면 진행 중이던
    # 이전 실행을 취소해 "중간까지 달리다 만 리뷰"가 쌓이는 것을 줄인다.
    # (재사용 워크플로우는 워크플로우 레벨 concurrency가 호출자 기준이므로 잡 레벨에 둔다.
    #  concurrency 그룹은 레포 단위로 격리되어 소비 레포끼리 충돌하지 않는다)
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read          # PR 코드 읽기
      pull-requests: write     # 리뷰 코멘트 게시 (빠뜨리면 게시 실패)
      id-token: write          # OIDC 토큰 발급 (claude-code-action 인증에 필요)
    steps:
      # 1) 리뷰받을 PR 코드 체크아웃 (호출한 소비 레포의 코드)
      #    pull_request 이벤트면 PR head SHA, /review 코멘트 이벤트면 refs/pull/<번호>/head 를 체크아웃
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: >-
            ${{ github.event_name == 'pull_request'
                && github.event.pull_request.head.sha
                || format('refs/pull/{0}/head', github.event.issue.number) }}

      # 2) 프롬프트를 가진 중앙 레포를 별도 경로에 체크아웃
      #    (중앙 레포가 public 이면 토큰 불필요. private 이면 아래 token 줄 주석 해제)
      - name: Checkout central prompt repo
        uses: actions/checkout@v4
        with:
          repository: thought-corner/ai-review-workflow
          ref: v1
          path: .review-central
          # token: ${{ secrets.CENTRAL_REPO_PAT }}   # private 레포일 때만

      # 3) prompts/review.md 를 읽어 변수로 로드 (+ PR 번호를 앞에 주입)
      - name: Load review prompt
        id: prompt
        env:
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.issue.number }}
          PROMPT_FILE: ${{ inputs.prompt_file }}
          SCOPE: ${{ inputs.scope }}
        run: |
          {
            echo 'PROMPT<<CLAUDE_EOF'
            echo "리뷰 대상 PR 번호: #${PR_NUMBER} — gh 명령에는 이 번호를 사용하라 (예: gh pr view ${PR_NUMBER}, gh pr comment ${PR_NUMBER})."
            if [ -n "${SCOPE}" ]; then
              echo
              echo "지정된 리뷰 범위(원문): ${SCOPE}"
              echo "위 원문에서 슬래시 명령어 토큰(예: /arch-review)은 제외하고 나머지를 리뷰 범위로 해석하라. 이 범위 밖 코드는 참고만 하고 지적하지 않는다."
            fi
            echo
            cat ".review-central/${PROMPT_FILE}"
            echo CLAUDE_EOF
          } >> "$GITHUB_OUTPUT"

      # 4) Claude 실행 → 리뷰를 PR 코멘트로 게시
      #    gh api 허용: 재실행 시 기존 인라인 리뷰 코멘트를 조회해 중복 지적을 거르기 위함
      #    (쓰기 범위는 어차피 GITHUB_TOKEN 의 pull-requests: write 로 제한된다)
      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ steps.prompt.outputs.PROMPT }}
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns ${{ inputs.max_turns }}
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*)"