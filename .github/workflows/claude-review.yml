name: Claude Review (reusable)

# 중앙 레포에 두는 재사용 워크플로우.
# 다른 레포가 `uses: thought-corner/ai-review-workflow/.github/workflows/claude-review.yml@v1` 로 호출한다.

on:
  workflow_call:
    inputs:
      model:
        description: "리뷰에 사용할 모델 (예: claude-opus-4-8, claude-sonnet-5)"
        type: string
        required: false
        default: "claude-opus-4-8"
      max_turns:
        description: "에이전트 최대 턴 수 (인라인 코멘트는 1건당 1턴을 쓰므로 넉넉히)"
        type: string
        required: false
        default: "40"
      prompt_file:
        description: "사용할 프롬프트 경로 (예: prompts/review.md, prompts/architecture.md, prompts/test-quality.md)"
        type: string
        required: false
        default: "prompts/review.md"
      scope:
        description: "리뷰 범위 힌트 (아키텍처 리뷰에서 도메인/모듈로 범위를 좁힐 때 사용. 코멘트 원문 그대로 넘겨도 됨)"
        type: string
        required: false
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "MAX 구독으로 발급한 OAuth 토큰 (claude setup-token)"
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    # 같은 PR·같은 리뷰 종류의 실행을 동시에 1개로 제한 — 새 실행이 시작되면 진행 중이던
    # 이전 실행을 취소해 "중간까지 달리다 만 리뷰"가 쌓이는 것을 줄인다.
    # (재사용 워크플로우는 워크플로우 레벨 concurrency가 호출자 기준이므로 잡 레벨에 둔다.
    #  concurrency 그룹은 레포 단위로 격리되어 소비 레포끼리 충돌하지 않는다)
    # 그룹에 prompt_file 을 포함해 리뷰 종류별로 격리한다 — 안 그러면 같은 PR에서
    # 일반 리뷰와 테스트 리뷰가 동시에 돌 때 서로를 취소한다.
    # @claude 후속 질문 답변은 별도 그룹 + 취소 없음 (질문이 진행 중인 리뷰를 죽이면 안 됨).
    concurrency:
      group: claude-review-${{ contains(github.event.comment.body, '@claude') && 'answer' || inputs.prompt_file }}-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: ${{ !contains(github.event.comment.body, '@claude') }}
    permissions:
      contents: read          # PR 코드 읽기
      pull-requests: write     # 리뷰 코멘트 게시 (빠뜨리면 게시 실패)
      id-token: write          # OIDC 토큰 발급 (claude-code-action 인증에 필요)
    steps:
      # 1) 리뷰받을 PR 코드 체크아웃 (호출한 소비 레포의 코드)
      #    pull_request 이벤트면 PR head SHA, 코멘트 이벤트면 refs/pull/<번호>/head 를 체크아웃
      #    (PR 번호: issue_comment 는 issue.number, pull_request_review_comment 는
      #     pull_request.number 에 실려 온다 — || 로 둘 다 흡수)
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: >-
            ${{ github.event_name == 'pull_request'
                && github.event.pull_request.head.sha
                || format('refs/pull/{0}/head', github.event.pull_request.number || github.event.issue.number) }}

      # 2) 프롬프트를 가진 중앙 레포를 별도 경로에 체크아웃
      #    (중앙 레포가 public 이면 토큰 불필요. private 이면 아래 token 줄 주석 해제)
      - name: Checkout central prompt repo
        uses: actions/checkout@v4
        with:
          repository: thought-corner/ai-review-workflow
          ref: v1
          path: .review-central
          # token: ${{ secrets.CENTRAL_REPO_PAT }}   # private 레포일 때만

      # 3) 프롬프트 로드 (+ PR 번호 등 컨텍스트를 앞에 주입)
      #    - @claude 멘션 코멘트 → prompts/answer.md (후속 질문 답변 모드)
      #    - 그 외 → inputs.prompt_file (일반/아키텍처/테스트 리뷰)
      #    코멘트 본문은 셸 인터폴레이션이 아닌 env 로만 전달한다(커맨드 인젝션 방지).
      - name: Load prompt
        id: prompt
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          PROMPT_FILE: ${{ inputs.prompt_file }}
          SCOPE: ${{ inputs.scope }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # 코멘트 본문에 heredoc 종결자와 같은 문자열이 있으면 GITHUB_OUTPUT 이 깨지므로 제거
          # 코멘트 본문/스코프에 heredoc 종결자와 같은 문자열이 있으면 GITHUB_OUTPUT 이
          # 깨지므로 제거 (SCOPE도 PR 코멘트 원문이라 COMMENT_BODY와 동일하게 취급)
          COMMENT_BODY="${COMMENT_BODY//CLAUDE_EOF/}"
          SCOPE="${SCOPE//CLAUDE_EOF/}"
          {
            echo 'PROMPT<<CLAUDE_EOF'
            case "$COMMENT_BODY" in