# 소비 레포의 .github/workflows/architecture-review.yml 에 넣는다.
# 아키텍처 설계 리뷰 — PR에 코멘트로만 수동 실행(온디맨드). 전 범위를 훑으면 할루시네이션
# 위험이 크므로, 반드시 범위를 좁혀서 부른다:
#   /arch-review payment
#   /arch-review src/main/kotlin/com/example/order
# (범위를 안 적으면 리뷰어가 이 PR이 속한 모듈 하나로 스스로 좁혀서 본다)

name: Claude Architecture Review

on:
  issue_comment:
    types: [created]

jobs:
  arch-review:
    # author_association 체크: 아키텍처 재검토는 비용이 크고, scope에 코멘트 원문이
    # 그대로 프롬프트에 주입되므로 외부 기여자가 임의로 트리거/인젝션하지 못하도록
    # 권한 있는 사람(OWNER/MEMBER/COLLABORATOR)만 허용한다.
    if: >-
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/arch-review')
      startsWith(github.event.comment.body, '/arch-review') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    permissions:
      contents: read
      pull-requests: write